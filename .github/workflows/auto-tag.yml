name: Auto Tag

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  auto-tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Determine next version
        id: version
        run: |
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$last_tag" ]; then
            base="0.0.0"
            range="HEAD~1..HEAD"
          else
            base=${last_tag#v}
            range="$last_tag..HEAD"
          fi

          commits=$(git log --format=%s $range)
          bump=none
          if echo "$commits" | grep -Eq 'BREAKING CHANGE|!:'; then
            bump=major
          elif echo "$commits" | grep -Eq '^feat(\(.+\))?:'; then
            bump=minor
          elif echo "$commits" | grep -Eq '^(fix|perf)(\(.+\))?:'; then
            bump=patch
          fi

          if [ "$bump" = "none" ]; then
            echo "create=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          IFS=. read -r major minor patch <<< "$base"
          if [ "$bump" = major ]; then
            major=$((major+1)); minor=0; patch=0
          elif [ "$bump" = minor ]; then
            minor=$((minor+1)); patch=0
          else
            patch=$((patch+1))
          fi

          echo "create=true" >> $GITHUB_OUTPUT
          echo "tag=v${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
      - name: Create tag
        if: steps.version.outputs.create == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
